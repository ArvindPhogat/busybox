jo nginx and deapiVersion: v1
kind: Pod
metadata:
  name: s3-pvc-test
  namespace: demo
spec:
  restartPolicy: Never
  containers:
  - name: writer
    image: busybox:1.36
    command: ["sh", "-c", "echo PVC-MOUNT-OK > /data/check.txt && sleep 3600"]
    volumeMounts:
    - name: s3-storage
      mountPath: /data
  volumes:
  - name: s3-storage
    persistentVolumeClaim:
      claimName: s3-host-pvc
