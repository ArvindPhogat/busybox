rpod apiVersion: v1
kind: Namespace
metadata:
  name: busybox-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-busybox
  namespace: busybox-ns
  labels:
    app: demo-busybox
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-busybox
  template:
    metadata:
      labels:
        app: demo-busybox
    spec:
      containers:
      - name: busybox
        image: docker.io/library/busybox:1.36
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "while true; do echo BusyBox Running...; sleep 30; done"]
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
